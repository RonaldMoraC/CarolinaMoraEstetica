<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Estética Carolina Mora</title>
    <link rel="stylesheet" href="global.css">
</head>

<body>

    <div class="container" style="padding-top: 20px; padding-bottom: 40px; max-width: 600px;">

        <header class="app-header">
            <div class="d-flex align-center gap-1">
                <button class="icon-btn" onclick="window.location.href='catalogo.html'"
                    title="Volver al catálogo">⬅️</button>
                <h1 class="fw-bold" style="font-size: 1.4rem; margin: 0;">Mi Perfil</h1>
            </div>
            <small class="text-muted" style="font-weight: 600;">Carolina Mora</small>
        </header>

        <main class="card">

            <div class="text-center" style="margin-bottom: 24px;">
                <div class="service-icon"
                    style="width: 90px; height: 90px; border-radius: 50%; margin: 0 auto 12px; font-size: 2.5rem; background-color: rgba(0, 208, 255, 0.1);">
                    👤
                </div>
                <h2 id="lblNombreUsuario" class="fw-bold" style="font-size: 1.3rem; margin-bottom: 4px;">Cargando...
                </h2>
                <p class="text-muted" style="font-size: 0.85rem; font-weight: 600;">Cliente Registrado</p>
            </div>

            <div id="profile-status" class="badge badge-success"
                style="display: none; width: 100%; margin-bottom: 20px; padding: 10px; border-radius: 8px; text-transform: none;">
            </div>

            <form id="profileForm" autocomplete="off">

                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Su nombre" required>
                </div>

                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" name="telefono" class="form-control"
                        placeholder="Ingrese su teléfono">
                </div>

                <div class="form-group mb-4">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" name="correo" class="form-control"
                        placeholder="Ingrese su correo electrónico" required>
                </div>

                <button type="submit" id="btnGuardarPerfil" class="btn btn-primary btn-block">
                    Guardar Cambios
                </button>
            </form>

            <div style="margin-top: 16px; border-top: 1px solid var(--color-border); padding-top: 16px;">
                <button class="btn btn-danger-outline btn-block" onclick="cerrarSesion()">
                    Cerrar Sesión
                </button>
            </div>
        </main>
    </div>

    <script>
        // Función auxiliar de deslogueo en cliente
        function cerrarSesion() {
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
